<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <title>Go to URL</title>
  <link rel="stylesheet" type="text/css" href="login.css">
</head>
<body>
  <div class="dialog">
    <header class="dialog-header">
      <h1 class="dialog-title">Go to URL</h1>
      <p class="dialog-subtitle">Open a new address in this window</p>
    </header>
    <div class="dialog-body">
      <form class="dialog-form" id="go-to-url-form">
        <div class="field">
          <label for="url-input">URL</label>
          <input type="text" id="url-input" placeholder="https://example.com" autofocus spellcheck="false"/>
        </div>
        <div class="dialog-actions">
          <button id="submit-form-button" class="dialog-button" type="submit">Go</button>
        </div>
      </form>
    </div>
  </div>
  <script src="go-to-url.js"></script>
</body>
</html>
